<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعيين كلمة مرور جديدة | حجتي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/hajjati.css">
</head>
<body class="page-otp auth-bg">

  <!-- ══ الشريط الحكومي ══ -->
  <div class="gov-bar">
    <div class="gov-bar-right">
      <span>المملكة العربية السعودية</span>
      <div class="gov-sep"></div>
      <span class="gov-ministry">وزارة الحج والعمرة</span>
    </div>
    <div class="gov-bar-left">
      <a class="gov-bar-link" href="/pages/faq.html">الأسئلة الشائعة</a>
    </div>
  </div>

  <!-- ══ شريط التنقل ══ -->
  <nav class="navbar">
    <a class="nav-brand" href="/pages/primaryHome.html">
      <img src="/assets/logo_white-removebg.png" alt="حجتي" class="nav-logo-img">
      <div class="brand-sub">منصة إدارة الحج الوطنية</div>
    </a>
  </nav>

  <!-- ══ منطقة الكارد ══ -->
  <div class="auth-main">
    <div class="auth-card otp-card">

      <!-- رأس الكارد -->
      <div class="auth-card-header">
        <div class="auth-card-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div>
          <div class="auth-card-title">تعيين كلمة مرور جديدة</div>
          <div class="auth-card-sub">أدخل كلمة المرور الجديدة لحسابك</div>
        </div>
      </div>

      <!-- جسم الكارد -->
      <div class="auth-card-body">

        <!-- رسالة الخطأ -->
        <div id="errorMsg" style="display:none; background:#FEE2E2; border:1px solid #FECACA; border-radius:6px; padding:10px 14px; font-size:13px; font-weight:600; color:#991B1B; margin-bottom:16px;"></div>

        <!-- رسالة النجاح -->
        <div id="successMsg" style="display:none; background:#D1FAE5; border:1px solid #6EE7B7; border-radius:6px; padding:10px 14px; font-size:13px; font-weight:600; color:#065F46; margin-bottom:16px;"></div>

        <!-- حقل كلمة المرور الجديدة -->
        <div class="form-field">
          <label class="form-label">كلمة المرور الجديدة <span class="form-req">*</span></label>
          <div style="position:relative;">
            <input id="password" type="password" class="form-input" placeholder="••••••••" style="padding-left:44px;">
            <button type="button" onclick="togglePass('password','eye1')" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--c-label); padding:0;">
              <svg id="eye1" viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- حقل تأكيد كلمة المرور -->
        <div class="form-field">
          <label class="form-label">تأكيد كلمة المرور <span class="form-req">*</span></label>
          <div style="position:relative;">
            <input id="confirm" type="password" class="form-input" placeholder="••••••••" style="padding-left:44px;">
            <button type="button" onclick="togglePass('confirm','eye2')" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--c-label); padding:0;">
              <svg id="eye2" viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- زر الحفظ -->
        <button id="saveBtn" class="auth-submit" onclick="updatePassword()">
          حفظ كلمة المرور
        </button>

      </div>
    </div>
  </div>

  <!-- ══ التذييل ══ -->
  <footer>
    <div class="footer-bottom" style="border-top:1px solid rgba(255,255,255,0.06);">
      <span>© ١٤٤٧ هـ — منصة حجتي</span>
      <div class="footer-bottom-links">
        <a href="/pages/faq.html">الأسئلة الشائعة</a>
        <a href="#">سياسة الخصوصية</a>
      </div>
    </div>
  </footer>

  <div class="toast-root" id="toastRoot"></div>

  <script type="module">
    import { supabase } from '/js/supabaseClient.js';

    window.togglePass = function(fieldId, iconId) {
      const f = document.getElementById(fieldId);
      f.type = f.type === 'password' ? 'text' : 'password';
    };

    window.updatePassword = async function () {
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const errEl    = document.getElementById('errorMsg');
      const succEl   = document.getElementById('successMsg');
      const btn      = document.getElementById('saveBtn');

      errEl.style.display  = 'none';
      succEl.style.display = 'none';

      if (!password || password.length < 6) {
        errEl.textContent   = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل.';
        errEl.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        errEl.textContent   = 'كلمة المرور وتأكيدها غير متطابقين.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span> جارٍ الحفظ...';

      const { error } = await supabase.auth.updateUser({ password });

      btn.disabled    = false;
      btn.textContent = 'حفظ كلمة المرور';

      if (error) {
        errEl.textContent   = 'حدث خطأ: ' + error.message;
        errEl.style.display = 'block';
      } else {
        succEl.textContent   = '✅ تم تغيير كلمة المرور بنجاح! سيتم تحويلك...';
        succEl.style.display = 'block';
        setTimeout(() => { window.location.href = '/pages/primaryHome.html'; }, 2000);
      }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.updatePassword();
    });
  </script>

</body>
</html>
